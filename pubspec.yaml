name: smart_assistant
description: A Smart Assistant App with chat, suggestions, and history.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.19.6 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: ^4.6.5
  dio: ^5.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shimmer: ^3.0.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.3.1

flutter:
  uses-material-design: true
